name: Flatten Project Structure

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flatten:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v5

    - name: Show current structure (before)
      run: ls -R

    - name: Detect and flatten folder
      run: |
        folder=$(ls -d */ | head -n 1)

        echo "Detected folder: $folder"

        if [ -d "$folder" ]; then
          mv "$folder"* .
          mv "$folder".* . 2>/dev/null || true
          rm -rf "$folder"
        else
          echo "No folder found to flatten"
        fi

    - name: Show structure after flatten
      run: ls -R

    - name: Commit changes
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add .
        git commit -m "Flattened project structure" || echo "No changes"
        git push
